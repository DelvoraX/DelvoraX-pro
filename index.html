<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DelvoraX — Launching Soon</title>
  <meta name="description" content="AI sales-outreach co-pilot. Launching soon at delvorax.pro." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Source+Sans+3:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1A1F2E;
      --teal: #0F8C74;
      --white: #FFFFFF;
      --surface: #F6F7F9;
      --hairline: #E5E8ED;
      --text-muted: #6B7280;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--white);
      color: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .orb {
      width: 72px;
      height: 72px;
      margin-bottom: 2rem;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.97); }
    }
    .wordmark {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 3rem;
    }
    .rule {
      width: 40px;
      height: 1px;
      background: var(--hairline);
      margin: 0 auto 3rem;
    }
    .headline {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--navy);
      text-align: center;
      line-height: 1.2;
      max-width: 520px;
      margin-bottom: 1rem;
    }
    .headline span { color: var(--teal); }
    .sub {
      font-size: 1rem;
      color: var(--text-muted);
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 3rem;
    }
    .form-row {
      display: flex;
      gap: 0.75rem;
    }
    .form input,
    .form select,
    .form textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      color: var(--navy);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    .form input:focus,
    .form select:focus,
    .form textarea:focus { border-color: var(--teal); }
    .form input::placeholder,
    .form textarea::placeholder { color: var(--text-muted); }
    .form select { color: var(--text-muted); cursor: pointer; }
    .form select.filled { color: var(--navy); }
    .form textarea { resize: vertical; min-height: 100px; }
    .form button {
      padding: 0.85rem 1.4rem;
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .form button:hover { background: #0a7460; }
    .form button:disabled { background: #1D9E75; cursor: default; }
    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--hairline);
    }
    @media (max-width: 480px) {
      .form-row { flex-direction: column; }
    }
    @media (prefers-reduced-motion: reduce) {
      .orb { animation: none; }
    }
  </style>
</head>
<body>
  <svg class="orb" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="32" cy="32" r="26" fill="none" stroke="#0F8C74" stroke-width="1.5" stroke-dasharray="2.2 4.4"/>
    <circle cx="32" cy="32" r="16" fill="none" stroke="#0F8C74" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="6" fill="#0F8C74"/>
  </svg>
  <p class="wordmark">DelvoraX</p>
  <p class="tagline">AI Outreach Co-Pilot</p>
  <div class="rule"></div>
  <h1 class="headline">
    Add accounts.<br/>
    Fill the <span>calendar.</span>
  </h1>
  <p class="sub">
    Launching soon. Leave your details and you'll be first to know when early access opens.
  </p>
  <div class="form">
    <div class="form-row">
      <input type="text" id="firstName" placeholder="First name" />
      <input type="text" id="lastName" placeholder="Last name" />
    </div>
    <input type="email" id="email" placeholder="Email address" />
    <input type="text" id="business" placeholder="Business name" />
    <input type="tel" id="phone" placeholder="Phone number" />
    <select id="country" onchange="this.classList.add('filled')">
      <option value="" disabled selected>Country</option>
      <option>Afghanistan</option><option>Albania</option><option>Algeria</option><option>Argentina</option><option>Australia</option><option>Austria</option><option>Belgium</option><option>Brazil</option><option>Canada</option><option>Chile</option><option>China</option><option>Colombia</option><option>Croatia</option><option>Czech Republic</option><option>Denmark</option><option>Egypt</option><option>Finland</option><option>France</option><option>Germany</option><option>Greece</option><option>Hungary</option><option>India</option><option>Indonesia</option><option>Iran</option><option>Iraq</option><option>Ireland</option><option>Israel</option><option>Italy</option><option>Japan</option><option>Jordan</option><option>Kenya</option><option>Malaysia</option><option>Mexico</option><option>Netherlands</option><option>New Zealand</option><option>Nigeria</option><option>Norway</option><option>Pakistan</option><option>Philippines</option><option>Poland</option><option>Portugal</option><option>Romania</option><option>Russia</option><option>Saudi Arabia</option><option>Singapore</option><option>South Africa</option><option>South Korea</option><option>Spain</option><option>Sweden</option><option>Switzerland</option><option>Thailand</option><option>Turkey</option><option>Ukraine</option><option>United Arab Emirates</option><option>United Kingdom</option><option>United States</option><option>Vietnam</option>
    </select>
    <textarea id="message" placeholder="Anything you'd like us to know?"></textarea>
    <button id="submitBtn" onclick="submitForm()">Get early access</button>
  </div>
  <p class="footer">delvorax.pro</p>
  <script>
    async function submitForm() {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const business = document.getElementById('business').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const country = document.getElementById('country').value;
      const message = document.getElementById('message').value.trim();
      const btn = document.getElementById('submitBtn');
      if (!firstName || !email || !email.includes('@')) {
        document.getElementById(!firstName ? 'firstName' : 'email').focus();
        return;
      }
      btn.textContent = 'Sending...';
      btn.disabled = true;
      try {
        const res = await fetch('https://formspree.io/f/xzdljvjp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            'First name': firstName,
            'Last name': lastName,
            email: email,
            'Business': business,
            'Phone': phone,
            'Country': country,
            'Message': message
          })
        });
        if (res.ok) {
          btn.textContent = "You're on the list";
          document.querySelectorAll('.form input, .form select, .form textarea').forEach(el => el.disabled = true);
        } else {
          btn.textContent = 'Try again';
          btn.disabled = false;
        }
      } catch {
        btn.textContent = 'Try again';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
